spring:
  application:
    name: event-management-backend

  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/eventdb}
    username: ${DB_USER:postgres}
    password: ${DB_PASSWORD:postgres}
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 30000
      idle-timeout: 600000

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        default_schema: public
        jdbc:
          time_zone: UTC

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    validate-on-migrate: true
    clean-disabled: false
    clean-on-validation-error: true

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

  cache:
    type: redis
    redis:
      time-to-live: 300000

  mail:
    host: ${SMTP_HOST:smtp.gmail.com}
    port: ${SMTP_PORT:587}
    username: ${SMTP_USER:qdai1209@gmail.com}
    password: ${SMTP_PASS:zlgzivygukzbqgov}
    properties:
      mail.smtp.auth: true
      mail.smtp.starttls.enable: true
      mail.smtp.starttls.required: true

  servlet:
    multipart:
      max-file-size: 5MB
      max-request-size: 10MB

  mvc:
    format:
      date-time: iso

# App custom properties
app:
  jwt:
    secret: ${JWT_SECRET:dev-secret-key-minimum-32-characters-long}
    access-token-expiry: ${JWT_ACCESS_EXPIRY:900}
    refresh-token-expiry: ${JWT_REFRESH_EXPIRY:604800}
  cors:
    allowed-origins: ${FRONTEND_URL:http://localhost:5173}
  cloudinary:
    cloud-name: ${CLOUDINARY_CLOUD_NAME:}
    api-key: ${CLOUDINARY_API_KEY:}
    api-secret: ${CLOUDINARY_API_SECRET:}
  qr:
    secret: ${QR_SECRET:qr-secret-key-for-signing}
  email:
    from: ${EMAIL_FROM:qdai1209@gmail.com}

# Swagger / OpenAPI
springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: alpha
  default-produces-media-type: application/json
  info:
    title: Prestige Planner API
    description: Prestige Planner Event Management Website Backend API
    version: 1.0.0

server:
  port: 8080
  error:
    include-message: never
    include-binding-errors: never

logging:
  level:
    root: INFO
    com.eventhub: DEBUG
    org.springframework.security: WARN
    org.hibernate.SQL: WARN
